<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microsoft Reward Hack</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      padding-bottom: 50px;
    }

    p {
      font-size: 1.2rem;
      padding-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>Microsoft Bing Points Hack</h1>

  <p>Ok So Keep your phone or Desktop on Side for 4 minutes</p>

  <p>And Don't do Anything</p>

  <p>It will start in a moment</p>

  <script>
    function generateCVID() {
      var chars = '0123456789ABCDEF';
      var cvid = '';
      for (var i = 0; i < 32; i++) {
        cvid += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return cvid;
    }

    var sessionCVID = generateCVID();

    function openWebpage(searchNumber) {
      window.open('https://www.bing.com/search?q=' + searchNumber + '&qs=n&form=QBRE&sp=-1&lq=0&cvid=' + sessionCVID);
    }

    var numberOfOpens = 34;
    var counter = 0;
    var intervalID = setInterval(function() {
      openWebpage(counter + 69);
      counter++;

      if (counter === numberOfOpens) {
        clearInterval(intervalID);
        window.location.href = './done.html';
      }
    }, 7000);
  </script>
</body>
